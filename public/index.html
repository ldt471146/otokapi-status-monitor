<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenToken 渠道状态</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2310b981'/%3E%3Cpath d='M8 17.5 13.2 22 24 10' fill='none' stroke='white' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="status-toolbar" aria-label="状态控制">
        <a class="brand-link" href="https://otokapi.com/monitor" target="_blank" rel="noreferrer">OpenToken</a>
        <div class="toolbar-actions">
          <div class="range-tabs" role="tablist" aria-label="可用性周期">
            <button class="range-tab active" type="button" data-range="7" role="tab" aria-selected="true">7 天</button>
            <button class="range-tab" type="button" data-range="15" role="tab" aria-selected="false">15 天</button>
            <button class="range-tab" type="button" data-range="30" role="tab" aria-selected="false">30 天</button>
          </div>
          <span class="overall-pill" id="overallPill"><span></span>UNKNOWN</span>
          <button class="icon-button" id="refreshButton" type="button" aria-label="刷新">↻</button>
          <span class="refresh-pill" id="refreshPill">自动刷新: --s</span>
        </div>
      </header>

      <section class="channel-grid" id="channelGrid" aria-live="polite"></section>

      <p class="footnote" id="footnote">正在读取状态...</p>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
